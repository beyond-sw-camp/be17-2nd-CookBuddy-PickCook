name: Deploy to Kubernetes

on:
  pull_request:
    branches: [develop]
    types: [closed]

jobs:
  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Create image tag
        id: image-tag
        run: |
          IMAGE_TAG="johnheo81/pickcook:build-${{ github.run_number }}"
          echo "tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "Building image: $IMAGE_TAG"

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image-tag.outputs.tag }}
            johnheo81/pickcook:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'latest'

      - name: Configure kubectl
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Blue-Green 배포 스크립트 실행
          chmod +x ./k8s/blue-green-deploy.sh
          ./k8s/blue-green-deploy.sh ${{ steps.image-tag.outputs.tag }}
