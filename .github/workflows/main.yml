name: Frontend Deployment

on:
  push:
    branches: [develop]
  workflow_dispatch: 

jobs:
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check files
        run: ls -la

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build Vue project
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
        run: npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/pickcook-frontend:${{ github.run_number }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: SSH and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            # Blue-Green 배포 결정
            if kubectl get svc pickcook-frontend-svc -n kay | grep -q "blue"; then
              export CURRENT_VER="blue"
              export NEXT_VER="green"
            else
              export CURRENT_VER="green"
              export NEXT_VER="blue"
            fi

            echo ">>> CURRENT_VER=$CURRENT_VER"
            echo ">>> NEXT_VER=$NEXT_VER"

            echo ">>> 현재 kay 네임스페이스의 Deployment 상태"
            kubectl get deploy -n kay -o wide

            # Deployment 생성/업데이트
            cat <<EOF | kubectl apply -f -
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: pickcook-frontend-${NEXT_VER}
              namespace: kay
            spec:
              replicas: 1
              selector:
                matchLabels:
                  type: frontend
                  ver: ${NEXT_VER}
              strategy:
                type: RollingUpdate
              template:
                metadata:
                  labels:
                    type: frontend
                    ver: ${NEXT_VER}
                spec:
                  containers:
                  - name: container
                    image: ${{ secrets.DOCKERHUB_USERNAME }}/pickcook-frontend:${{ github.run_number }}
                    ports:
                    - containerPort: 80
                    env:
                    - name: VITE_API_URL
                      value: ${{ secrets.VITE_API_URL }}
                    livenessProbe:
                      httpGet:
                        path: /index.html
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 10
                    readinessProbe:
                      httpGet:
                        path: /index.html
                        port: 80
                      initialDelaySeconds: 10
                      periodSeconds: 5
                      successThreshold: 1
                  terminationGracePeriodSeconds: 0
            EOF

            # 롤아웃 확인
            kubectl rollout status deployment/pickcook-frontend-${NEXT_VER} -n kay

            # Service 업데이트
            cat <<EOF | kubectl apply -f -
            apiVersion: v1
            kind: Service
            metadata:
              name: pickcook-frontend-svc
              namespace: kay
            spec:
              selector:
                type: frontend
                ver: ${NEXT_VER}
              ports:
                - port: 80
                  targetPort: 80
              type: LoadBalancer
            EOF

            # 이전 버전 scale down (존재할 때만)
            if kubectl get deployment pickcook-frontend-${CURRENT_VER} -n kay &> /dev/null; then
              echo ">>> 이전 버전 scale down: $CURRENT_VER"
              kubectl scale deployment pickcook-frontend-${CURRENT_VER} -n kay --replicas=0
            else
              echo ">>> 이전 버전 $CURRENT_VER 존재하지 않음, 스케일 다운 생략"
            fi
